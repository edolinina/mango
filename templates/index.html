<!DOCTYPE html>
<html>
<head>
  <title>MANGO Operator</title>
  <link rel="icon" href="data:image/svg+xml,
  <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
    <text y='0.9em' font-size='90'>🥭</text>
  </svg>">
  <style>
    body {
      background: radial-gradient(circle at top, #1e293b, #020617);
      color: #e5e7eb;
      font-family: Inter, system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }
    .card {
      background: #020617;
      border-radius: 14px;
      padding: 32px;
      width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 30px 80px rgba(0,0,0,.6);
      margin-top: 64px;
    }
    .card h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 24px;
    }
    textarea {
      width: 100%;
      height: 90px;
      background: #020617;
      color: #e5e7eb;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px;
      resize: none;
    }
    button {
      margin-top: 16px;
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg,#22d3ee,#6366f1);
      color: #020617;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled {
      opacity: .6;
      cursor: not-allowed;
    }
    .spinner {
        display: none;
        margin-top: 16px;
        text-align: center;
    }

    .loader {
        width: 36px;
        height: 36px;
        border: 4px solid #334155;
        border-top: 4px solid #22d3ee;
        border-radius: 50%;
        margin: 0 auto 10px;
        animation: spin 0.9s linear infinite;
    }

    .agents-list {
        display: flex;
        justify-content: center;
        gap: 18px;
        margin-top: 16px;
    }

    .agent-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 70px;
    }

    .agent-circle {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: #334155;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 18px;
        margin-bottom: 6px;
        position: relative;
        box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    .agent-spinner {
        position: absolute;
        top: -6px;
        left: -6px;
        width: 60px;
        height: 60px;
        border: 4px solid #334155;
        border-top: 4px solid #22d3ee;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
        z-index: 1;
        opacity: 0.7;
    }

    .result-label {
      color: #38bdf8; /* Tailwind sky-400, adjust as needed */
      font-weight: 600;
    }

    .agent-label {
        font-size: 13px;
        color: #e5e7eb;
        text-align: center;
        word-break: break-word;
        margin-top: 10px; /* Add this line for spacing */
    }

    @keyframes spin {
    to { transform: rotate(360deg); }
    }

    .agents {
      margin-top: 16px;
      font-size: 14px;
    }
    pre {
      margin-top: 16px;
      background: #020617;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px;
      max-height: 240px;
      overflow: auto;
      font-size: 13px;
    }
    .results {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .result-box,
    .result-box * {
      margin: 0;
      padding: 0;
    }

    .result-box {
      padding: 16px;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 10px;
      gap: 10px;
    }

    .result-box p {
      margin-top: 6px;
      line-height: 1.45;
    }

    .done {
      text-align: center;
      color: #22c55e;
      margin-top: 18px;
      font-weight: 600;
      font-size: 1.1em;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>MANGO 🥭 Operator</h1>

  <textarea id="task" placeholder="Describe your task..."></textarea>
  <button id="runBtn" onclick="run()">RUN</button>

  <div class="spinner" id="spinner">
  <div class="loader"></div>
    <p>Waiting for Agents</p>
  </div>
  <div class="agents" id="agents"></div>
  <div id="output" class="results"></div>
</div>

<script>
const spinner = document.getElementById("spinner");
const output = document.getElementById("output");
const agentsEl = document.getElementById("agents");
const taskEl = document.getElementById("task");
const runBtn = document.getElementById("runBtn");

let poller = null;

// 🔹 GLOBAL state (FIX #1)
let expectedAgents = [];
let finishedAgents = new Set();

async function run() {
  const task = taskEl.value.trim();
  if (!task) return;

  runBtn.disabled = true;
  runBtn.style.display = "none";
  spinner.style.display = "block";
  agentsEl.innerHTML = "";
  output.innerHTML = "";
  finishedAgents.clear();

  const res = await fetch("/run", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ task })
  });

  const data = await res.json();

  // ---- render agents (initial, spinning)
  if (data.agents) {
    expectedAgents = data.agents.slice(); // keep original names with emoji

    agentsEl.innerHTML = `
      <div class="agents-list">
        ${expectedAgents.map(a => agentBox(a, true)).join("")}
      </div>
    `;
    spinner.style.display = "none";
  }

  if (poller) clearInterval(poller);
  poller = setInterval(fetchResults, 5000);
  fetchResults();
}

async function fetchResults() {
  const res = await fetch("/results");
  const data = await res.json();

  if (!data || Object.keys(data).length === 0) return;

  renderResults(data);
}

function renderResults(results) {
  output.innerHTML = "";

  const agents = Array.isArray(results)
    ? results
    : Object.entries(results).map(([agent, reports]) => ({ agent, reports }));

  agents.forEach(a => finishedAgents.add(cleanName(a.agent)));

  // ---- update agent icons (FIX #2)
  const allFinished = finishedAgents.size === expectedAgents.length;

  agentsEl.innerHTML = `
    <div class="agents-list">
      ${expectedAgents.map(name =>
        agentBox(name, !allFinished && !finishedAgents.has(cleanName(name)))
      ).join("")}
    </div>
    ${
      allFinished
        ? `<div class="done">✅ All agents finished</div>`
        : ""
    }
  `;

  // ---- render results
  agents.forEach(agentObj => {
    let emoji = extractEmoji(agentObj.agent);
    if (!emoji) emoji = "🤖";
    let label = agentObj.agent.replace(/Agent\b.*$/,"").replace(/\p{Extended_Pictographic}/gu,"").trim().split(" ")[0];
    const base = `${label} ${emoji}`;

    output.innerHTML += `
      <div class="result-box">
        <h3>${base}</h3>
        ${agentObj.reports.map(r => {
          let parsed = {};
          try { parsed = JSON.parse(r.results); } catch {}
          return `
          <div class="cap">
            <p><span class="result-label">Capability applied:</span> ${r.capability}</p>
            ${parsed.recommendation ? `
              <p><span class="result-label">Recommendation:</span><br>${parsed.recommendation}</p>
            ` : ""}
            ${parsed.explanation ? `
              <p><span class="result-label">Explanation:</span><br>${parsed.explanation}</p>
            ` : ""}
            ${r.validation ? `
              <p><span class="result-label">Validation result:</span> ${r.validation}</p>
            ` : ""}
          </div>
        `;
        }).join("")}
      </div>
    `;
  });

  // ---- stop polling when done (FIX #3)
  if (finishedAgents.size === expectedAgents.length) {
    clearInterval(poller);
    spinner.style.display = "none";
    runBtn.disabled = false;
    runBtn.style.display = "";
  }
}

// ---------- helpers ----------
function cleanName(name) {
  return (name || "")
    .replace(/Agent.*$/,"")
    .replace(/[\u{1F300}-\u{1FAFF}\u{1F600}-\u{1F64F}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu,"")
    .trim()
    .split(" ")[0];
}

function extractEmoji(str) {
  // Get the last "word" (could be emoji or text)
  let parts = str.trim().split(" ");
  let last = parts[parts.length - 1];
  // If last contains at least one emoji codepoint, treat as emoji
  if (/\p{Extended_Pictographic}/u.test(last)) {
    return last;
  }
  return "";
}

function agentBox(name, spinning) {
  let emoji = extractEmoji(name);
  if (!emoji) emoji = "🤖";
  let label = name.replace(/Agent.*$/,"").replace(/\p{Extended_Pictographic}/gu,"").trim().split(" ")[0];
  return `
    <div class="agent-box">
      <div class="agent-circle" style="position:relative;">
        ${spinning ? '<div class="agent-spinner"></div>' : ''}
        <span style="position:relative; z-index:2; font-size:1.7em;">${emoji}</span>
      </div>
      <div class="agent-label">${label}</div>
    </div>
  `;
}
</script>

</body>
</html>

common:
  reasoning:
    prompt: >
      Act as an autonomous domain strategist.

      You reason in cycles. Each cycle you choose one of two actions:

      - action: query — ask a natural language question about the dataframe to gather evidence.
        Use this when you need more data before committing to a recommendation.

      - action: validate — provide your full recommendation text.
        The system will verify it against the dataframe and return pass/fail with evidence.
        If validation fails, you will receive feedback and must refine.

      Always query the dataframe at least once before validating.
      Base your recommendation on observed data patterns, not assumptions.

      Final output fields: recommendation, explanation, next_steps.

agents:
  - name: CentralExecutive
    role: strategic_controller
    avatar: 🧠
    instructions: >
      Your task: {task}.
      For each available agent and for each of its capabilities,
      generate one directive aligned with the agent's role and your task.

      Each directive MUST include only:
        - agent: target agent name
        - capability: one capability that agent should use to address the task
        - task: the task that this agent should fulfill derived from the overall target task
        but applicable to the agent's role, capability and data available.

      Output ONLY valid JSON.
      
      Available agents with capabilities, roles and data scopes:
      {agents}


  - name: BusinessAgent
    enabled: true
    role: business_strategy
    avatar: 👨🏻‍💼
    host: business-agent
    port-env: BUSINESS_AGENT_PORT

    data_source:
      target_file: data_sources/business.csv

    capabilities:
      - name: profitability_optimization
        avatar: 📊
        validator: profit

    validators:
      - name: profit
        task: regression
        target: netIncome
        features:
          - totalRevenue
          - grossProfit
          - operatingIncome
          - incomeBeforeTax
          - interestExpense
          - incomeTaxExpense
          - costOfRevenue
          - sellingGeneralAndAdministrative
          - researchAndDevelopment
          - operatingExpenses
        pass_condition: ">= MEAN"

  - name: CustomerServiceAgent
    enabled: true
    role: customer_service
    avatar: 🙋🏻‍♂️
    host: customers-agent
    port-env: CUSTOMERS_AGENT_PORT

    data_source:
      target_file: data_sources/customers.csv

    capabilities:
      - name: customer_loyalty_improvement
        avatar: 🤝
        validator: customers

    validators:
      - name: customers
        task: classification
        target: Churn
        features:
          - Partner
          - Tenure
          - Internet Service
          - Online Security
          - Device Protection
          - Tech Support
          - Paperless Billing
          - Total Charges
          - Number of Referrals
        pass_condition: "== 1"


  - name: HRAgent
    enabled: true
    role: human_resources
    avatar: 👩‍💼
    host: hr-agent
    port-env: HR_AGENT_PORT

    data_source:
      target_file: data_sources/hr.csv

    capabilities:
      - name: workforce_performance_improvement
        avatar: 🚀
        validator: workforce

    validators:
      - name: workforce
        task: classification
        target: PerformanceRating
        features:
          - JobLevel
          - JobInvolvement
          - JobSatisfaction
          - EnvironmentSatisfaction
          - WorkLifeBalance
          - TrainingTimesLastYear
          - YearsInCurrentRole
          - YearsSinceLastPromotion
          - YearsWithCurrManager
          - PercentSalaryHike
        pass_condition: ">= 3"

common:
  reasoning:
    prompt: >
        Use the provided data to propose a recommended solution.
        Recommendation should be brief (2-3 sentences), easy to understand and implement and strongly
        tied to the data provided. Provide explanation of how you arrived at this recommendation 
        based on the data analysis in a concise manner (no more than 2-3 sentences).

        In addition to your recommendations, generate a small simulated dataset
        (10 rows) that reflects the expected outcomes of your proposal based on the columns in the data.
        You MUST generate validation samples that strictly follow the provided 'ALLOWED_FEATURES'.
        DO NOT INCLUDE any other features into this dataset except the ones stated in 'ALLOWED_FEATURES'.
        The validation samples should represent the simulated values AFTER applying your recommendation.
        Each validation sample MUST be a flat JSON object with numeric values only.
        
        Return the output as VALID JSON with the following schema:
        {
          "recommendation": "...",
          "explanation": "...",
          "validation_samples": [
            { "<feature_1>": value, "<feature_2>": value, ... }
          ]
        }

judge:
  provider: openai
  model: "gpt-5-mini"
  prompt: |
    You are evaluating a managerial AI recommendation.

    Score each criterion on a scale of 1–10 (1 = very poor, 10 = excellent).

    Evaluation Criteria:

    1. Strategic Alignment –
       Does the recommendation directly address the stated managerial objective (TASK)?

    2. Logical Coherence –
       Is the reasoning internally consistent and supported by the provided data (DATA)?

    3. Constraint Awareness –
       Does the explanation explicitly consider the stated constraints (CONSTRAINTS)?

    4. Clarity and Actionability –
       Is the recommendation concise, clear, and practically implementable?

    TASK:
    {task}

    CONSTRAINTS:
    {constraints}

    DATA SUMMARY:
    {data_summary}

    RECOMMENDATION:
    {recommendation}

    EXPLANATION:
    {explanation}

    Return ONLY valid JSON using the predefined schema.

agents:
  - name: CentralExecutive
    role: strategic_controller
    avatar: 🧠
    instructions: >
      Your task: {task}.
      For each available agent and for each of its capabilities,
      generate one directive aligned with the agent's role and your task.

      Each directive MUST include only:
        - agent: target agent name
        - capability: one capability that agent should use to address the task
        - task: the task that this agent should fulfill derived from the overall target task
        but applicable to the agent's role, capability and data available.

      Output ONLY valid JSON.
      
      Available agents with capabilities, roles and data scopes:
      {agents}
  
  - name: BusinessAgent
    role: business_strategy
    avatar: 👨‍💼
    host: business-agent
    port-env: BUSINESS_AGENT_PORT
    data_source:
      download_from: harshmadhavan/vendor-performance-analysis
      data_file: vendor_sales_summary.csv
      target_file: data_sources/business.csv

    capabilities:
      - name: pricing_optimization
        avatar: 💰📊
        validator: profit_margin

      - name: profitability_growth
        avatar: 📈
        validator: gross_profit

    validators:
      - name: profit_margin
        target: ProfitMargin
        features: [
          "PurchasePrice", 
          "ActualPrice", 
          "Volume", 
          "TotalSalesQuantity", 
          "TotalSalesDollars"
        ]
        pass_condition: ">=MEAN"

      - name: gross_profit
        target: GrossProfit
        features: [
          "PurchasePrice", 
          "ActualPrice", 
          "TotalSalesQuantity", 
          "TotalSalesDollars"
        ]
        pass_condition: ">=MEAN"


  - name: SupplyAgent
    role: supply_chain_optimization
    avatar: 🚚
    host: supply-agent
    port-env: SUPPLY_AGENT_PORT
    data_source:
      download_from: harshmadhavan/vendor-performance-analysis
      data_file: vendor_sales_summary.csv
      target_file: data_sources/supply_chain.csv

    capabilities:
      - name: inventory_efficiency
        avatar: 📦
        validator: stock_turnover

      - name: procurement_balance
        avatar: ⚖️
        validator: sales_purchase_ratio

    validators:
      - name: stock_turnover
        target: StockTurnover
        features: [
          "TotalPurchaseQuantity", 
          "TotalPurchaseDollars", 
          "FreightCost", 
          "TotalExciseTax"
        ]
        pass_condition: ">=MEAN"

      - name: sales_purchase_ratio
        target: SalestoPurchaseRatio
        features: [
          "TotalPurchaseQuantity", 
          "TotalPurchaseDollars", 
          "TotalSalesQuantity", 
          "TotalSalesDollars"
        ]
        pass_condition: ">=MEAN"

  - name: HRAgent
    role: human_resources
    avatar: 👩‍💼
    host: hr-agent
    port-env: HR_AGENT_PORT
    data_source:
      download_from: stealthtechnologies/employee-attrition-dataset
      data_file: train.csv
      target_file: data_sources/hr.csv

    capabilities:
      - name: attrition_risk_management
        avatar: ⚠️👥
        validator: attrition_risk

      - name: workforce_performance
        avatar: 📊⚡
        validator: performance_rating

    validators:
      - name: attrition_risk
        target: Attrition
        features: [
          "Age",
          "Years at Company",
          "Monthly Income",
          "Work-Life Balance",
          "Job Satisfaction",
          "Overtime",
          "Distance from Home",
          "Number of Promotions",
          "Job Level"
        ]
        pass_condition: "==0"

      - name: performance_rating
        target: "Performance Rating"
        features: [
          "Years at Company",
          "Job Level",
          "Job Satisfaction",
          "Leadership Opportunities",
          "Innovation Opportunities",
          "Employee Recognition",
          "Work-Life Balance"
        ]
        pass_condition: ">=MEAN"
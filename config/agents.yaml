common:
  reasoning:
    prompt: >
        Use the provided data to propose a recommended solution.
        Recommendation should be brief (2-3 sentences), easy to understand and implement and strongly
        tied to the data provided. Provide explanation of how you arrived at this recommendation 
        based on the data analysis in a concise manner (no more than 2-3 sentences).

        In addition to your recommendations, generate a small simulated dataset
        (10 rows) that reflects the expected outcomes of your proposal based on the columns in the data.
        You MUST generate validation samples that strictly follow the provided 'ALLOWED_FEATURES'.
        DO NOT INCLUDE any other features into this dataset except the ones stated in 'ALLOWED_FEATURES'.
        The validation samples should represent the simulated values AFTER applying your recommendation.
        Each validation sample MUST be a flat JSON object with numeric values only.
        
        Return the output as VALID JSON with the following schema:
        {
          "recommendation": "...",
          "explanation": "...",
          "validation_samples": [
            { "<feature_1>": value, "<feature_2>": value, ... }
          ]
        }

judge:
  provider: openai
  model: "gpt-5-mini"
  prompt: |
    You are evaluating a managerial AI recommendation.

    Score each criterion on a scale of 1–10 (1 = very poor, 10 = excellent).

    Evaluation Criteria:

    1. Strategic Alignment –
       Does the recommendation directly address the stated managerial objective (TASK)?

    2. Logical Coherence –
       Is the reasoning internally consistent and supported by the provided data (DATA)?

    3. Constraint Awareness –
       Does the explanation explicitly consider the stated constraints (CONSTRAINTS)?

    4. Clarity and Actionability –
       Is the recommendation concise, clear, and practically implementable?

    TASK:
    {task}

    CONSTRAINTS:
    {constraints}

    DATA SAMPLE EXAMPLE:
    {data_sample}

    RECOMMENDATION:
    {recommendation}

    EXPLANATION:
    {explanation}

    Return ONLY valid JSON using the predefined schema.

agents:
  - name: CentralExecutive
    role: strategic_controller
    avatar: 🧠
    instructions: >
      Your task: {task}.
      For each available agent and for each of its capabilities,
      generate one directive aligned with the agent's role and your task.

      Each directive MUST include only:
        - agent: target agent name
        - capability: one capability that agent should use to address the task
        - task: the task that this agent should fulfill derived from the overall target task
        but applicable to the agent's role, capability and data available.

      Output ONLY valid JSON.
      
      Available agents with capabilities, roles and data scopes:
      {agents}
  
  - name: BusinessAgent
    role: business_performance
    avatar: 👨‍💼
    host: business-agent
    port-env: BUSINESS_AGENT_PORT
    data_source: data_sources/business.csv
    capabilities:
      - name: cost_optimization
        avatar: 💰📉
        validator: product_margin
      - name: delivery_risk_monitoring
        avatar: 🚚⚠️
        validator: delivery_risk

    validators:
      - name: product_margin
        target: product_margin
        features: [revenue, operational_cost, hr_spend, active_customers, month, delivery_risk]
        pass_condition: ">=MEAN"
      - name: delivery_risk
        target: delivery_risk
        features: [revenue, operational_cost, hr_spend, active_customers, product_margin]
        pass_condition: "<2"

  - name: ITAgent
    role: infrastructure_management
    avatar: 🧑‍💻
    host: it-agent
    port-env: IT_AGENT_PORT
    data_source: data_sources/it.csv
    capabilities:
      - name: cost_optimization
        avatar: 💰🖥️
        validator: infra_cost
      - name: sla_risk_assessment
        avatar: 📊✅
        validator: sla_met

    validators:
      - name: infra_cost
        target: infra_cost
        features: [traffic, capacity, sla_met]
        pass_condition: "<MEAN"
      - name: sla_met
        target: sla_met
        features: [traffic, capacity, infra_cost]
        pass_condition: "==1"

  - name: HRAgent
    role: human_resources
    avatar: 👩‍💼
    host: hr-agent
    port-env: HR_AGENT_PORT
    data_source: data_sources/hr.csv
    capabilities:
      - name: workforce_efficiency
        avatar: ⚡
        validator: performance_grade

    validators:
      - name: performance_grade
        target: performance_grade
        features: [role_level, contribution_rate, delivery_impact]
        pass_condition: ">=3"

